<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>¡Cañón Asesino!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Fredoka+One&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Fredoka One', cursive;
    touch-action: none;
  }

  #game-wrapper {
    position: relative;
    width: 400px;
    height: 700px;
    max-width: 100vw;
    max-height: 100vh;
  }

  #sky {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, #0d0d2b 0%, #1a1a4e 40%, #2d1b4e 70%, #3d1230 100%);
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #4a2080;
  }

  /* Stars */
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border-radius: 14px;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 12px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    z-index: 10;
    pointer-events: none;
  }

  .hud-box {
    background: rgba(0,0,0,0.5);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 4px 12px;
    color: white;
    font-size: 15px;
    letter-spacing: 1px;
  }

  .hud-box span {
    color: #f9c74f;
  }

  .lives-box span.lost {
    opacity: 0.2;
  }

  /* Fire button */
  #fire-btn {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    background: linear-gradient(135deg, #ff4444, #cc0000);
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    letter-spacing: 2px;
    padding: 14px 40px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,60,60,0.6), 0 4px 0 #880000;
    transition: transform 0.08s, box-shadow 0.08s;
    touch-action: manipulation;
    user-select: none;
  }
  #fire-btn:active {
    transform: translateX(-50%) translateY(3px);
    box-shadow: 0 0 10px rgba(255,60,60,0.4), 0 1px 0 #880000;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    border-radius: 14px;
    z-index: 30;
    gap: 18px;
  }

  .overlay h1 {
    font-family: 'Boogaloo', cursive;
    font-size: 52px;
    color: #f9c74f;
    text-shadow: 0 0 20px rgba(249,199,79,0.8);
    text-align: center;
    line-height: 1;
  }

  .overlay p {
    color: #ccc;
    font-size: 18px;
    text-align: center;
    max-width: 280px;
    line-height: 1.4;
  }

  .overlay .score-big {
    font-size: 64px;
    color: #90e0ef;
    text-shadow: 0 0 20px rgba(144,224,239,0.8);
  }

  .overlay button {
    background: linear-gradient(135deg, #43aa8b, #2d7a62);
    border: none;
    border-radius: 50px;
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    padding: 12px 36px;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(67,170,139,0.5), 0 4px 0 #1a4a3a;
    transition: transform 0.08s;
  }
  .overlay button:active { transform: translateY(3px); }

  #drag-hint {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="sky" id="sky-bg"></div>
  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-box">🏆 <span id="score-display">0</span></div>
    <div class="hud-box lives-box">❤️ <span id="lives-display">🐦🐦🐦🐦🐦</span></div>
  </div>

  <div id="drag-hint">⟵ arrastra para girar ⟶</div>

  <button id="fire-btn">💥 DISPARAR</button>

  <!-- Start screen -->
  <div class="overlay" id="start-screen">
    <h1>🐦 CAÑÓN<br>ASESINO</h1>
    <p>Arrastra para apuntar.<br>Pulsa DISPARAR para eliminar los pájaros.<br>¡No dejes pasar más de 5!</p>
    <button id="start-btn">¡JUGAR!</button>
  </div>

  <!-- Game over screen -->
  <div class="overlay" id="gameover-screen" style="display:none">
    <h1>💀 FIN</h1>
    <p>Puntuación final:</p>
    <div class="score-big" id="final-score">0</div>
    <button id="restart-btn">🔄 Reintentar</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('game-wrapper');

// Resize canvas to wrapper
function resizeCanvas() {
  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
}
resizeCanvas();

// --- GAME STATE ---
let state = {
  running: false,
  score: 0,
  escaped: 0, // birds that reached bottom
  cannonAngle: -Math.PI / 2, // pointing up
  birds: [],
  projectiles: [],
  particles: [],
  birdSpawnTimer: 0,
  birdSpawnInterval: 120, // frames
  frameCount: 0,
};

// --- STARS ---
const stars = [];
function generateStars() {
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.7,
      r: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}

// --- CANNON ---
const CANNON_X = () => canvas.width / 2;
const CANNON_Y = () => canvas.height - 100;
const CANNON_LENGTH = 44;
const CANNON_WIDTH = 16;

function drawCannon() {
  const cx = CANNON_X(), cy = CANNON_Y();
  ctx.save();
  ctx.translate(cx, cy);

  // Base wheel
  ctx.beginPath();
  ctx.arc(0, 0, 26, 0, Math.PI * 2);
  ctx.fillStyle = '#6b4226';
  ctx.fill();
  ctx.strokeStyle = '#3d2010';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Wheel spokes
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(a) * 22, Math.sin(a) * 22);
    ctx.strokeStyle = '#3d2010';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Cannon barrel
  ctx.rotate(state.cannonAngle + Math.PI / 2);
  ctx.beginPath();
  ctx.roundRect(-CANNON_WIDTH / 2, -CANNON_LENGTH, CANNON_WIDTH, CANNON_LENGTH, 4);
  ctx.fillStyle = '#555';
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Barrel shine
  ctx.beginPath();
  ctx.roundRect(-CANNON_WIDTH / 2 + 2, -CANNON_LENGTH + 4, 4, CANNON_LENGTH - 8, 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill();

  ctx.restore();
}

// --- BIRDS ---
const BIRD_COLORS = ['#ff9f1c', '#e63946', '#a8dadc', '#06d6a0', '#f72585'];

function spawnBird() {
  const x = 30 + Math.random() * (canvas.width - 60);
  state.birds.push({
    x,
    y: -20,
    vx: (Math.random() - 0.5) * 1.2,
    vy: 1.2 + Math.random() * 1.5,
    color: BIRD_COLORS[Math.floor(Math.random() * BIRD_COLORS.length)],
    wingPhase: Math.random() * Math.PI * 2,
    size: 14 + Math.random() * 8,
    alive: true,
  });
}

function drawBird(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  const wing = Math.sin(b.wingPhase) * 0.4;

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, b.size * 0.7, b.size * 0.45, 0, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Left wing
  ctx.save();
  ctx.rotate(-wing);
  ctx.beginPath();
  ctx.ellipse(-b.size * 0.6, -b.size * 0.1, b.size * 0.55, b.size * 0.22, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.fill();
  ctx.restore();

  // Right wing
  ctx.save();
  ctx.rotate(wing);
  ctx.beginPath();
  ctx.ellipse(b.size * 0.6, -b.size * 0.1, b.size * 0.55, b.size * 0.22, 0.3, 0, Math.PI * 2);
  ctx.fillStyle = b.color;
  ctx.fill();
  ctx.restore();

  // Eye
  ctx.beginPath();
  ctx.arc(b.size * 0.35, -b.size * 0.05, 3, 0, Math.PI * 2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(b.size * 0.38, -b.size * 0.05, 1.5, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(b.size * 0.65, b.size * 0.05);
  ctx.lineTo(b.size * 0.9, b.size * 0.15);
  ctx.lineTo(b.size * 0.65, b.size * 0.2);
  ctx.fillStyle = '#f4a261';
  ctx.fill();

  ctx.restore();
}

// --- PROJECTILES ---
function fireProjectile() {
  const cx = CANNON_X(), cy = CANNON_Y();
  const speed = 12;
  state.projectiles.push({
    x: cx + Math.cos(state.cannonAngle) * CANNON_LENGTH,
    y: cy + Math.sin(state.cannonAngle) * CANNON_LENGTH,
    vx: Math.cos(state.cannonAngle) * speed,
    vy: Math.sin(state.cannonAngle) * speed,
    trail: [],
    alive: true,
  });
  // Muzzle flash particles
  for (let i = 0; i < 12; i++) {
    const a = state.cannonAngle + (Math.random() - 0.5) * 0.8;
    const sp = 2 + Math.random() * 5;
    state.particles.push({
      x: cx + Math.cos(state.cannonAngle) * CANNON_LENGTH,
      y: cy + Math.sin(state.cannonAngle) * CANNON_LENGTH,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      decay: 0.08 + Math.random() * 0.08,
      color: Math.random() > 0.5 ? '#f9c74f' : '#ff6b35',
      size: 2 + Math.random() * 4,
    });
  }
}

function drawProjectile(p) {
  // Trail
  for (let i = 0; i < p.trail.length; i++) {
    const t = p.trail[i];
    const alpha = (i / p.trail.length) * 0.5;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 3 * (i / p.trail.length), 0, Math.PI * 2);
    ctx.fillStyle = `rgba(249,199,79,${alpha})`;
    ctx.fill();
  }
  // Ball
  ctx.beginPath();
  ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#333';
  ctx.fill();
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

// --- PARTICLES ---
function spawnExplosion(x, y, color) {
  for (let i = 0; i < 22; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1.5 + Math.random() * 6;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      decay: 0.03 + Math.random() * 0.05,
      color,
      size: 3 + Math.random() * 6,
    });
  }
  // Feather effect
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * (1 + Math.random() * 3),
      vy: Math.sin(a) * (1 + Math.random() * 3) + 1,
      life: 1,
      decay: 0.02,
      color: 'white',
      size: 1 + Math.random() * 3,
      isFeather: true,
    });
  }
}

function drawParticles() {
  state.particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    if (p.isFeather) {
      ctx.ellipse(p.x, p.y, p.size * 2, p.size * 0.5, Math.atan2(p.vy, p.vx), 0, Math.PI * 2);
    } else {
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    }
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  });
}

// --- COLLISION ---
function checkCollisions() {
  state.projectiles.forEach(proj => {
    if (!proj.alive) return;
    state.birds.forEach(bird => {
      if (!bird.alive) return;
      const dx = proj.x - bird.x;
      const dy = proj.y - bird.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < bird.size + 6) {
        proj.alive = false;
        bird.alive = false;
        state.score++;
        document.getElementById('score-display').textContent = state.score;
        spawnExplosion(bird.x, bird.y, bird.color);
      }
    });
  });
}

// --- UPDATE ---
function update() {
  state.frameCount++;
  state.birdSpawnTimer++;

  // Increase difficulty
  const interval = Math.max(50, 120 - Math.floor(state.score / 5) * 8);
  if (state.birdSpawnTimer >= interval) {
    spawnBird();
    state.birdSpawnTimer = 0;
  }

  // Update birds
  state.birds.forEach(b => {
    if (!b.alive) return;
    b.x += b.vx;
    b.y += b.vy;
    b.wingPhase += 0.15;
    // Bounce on sides
    if (b.x < 10 || b.x > canvas.width - 10) b.vx *= -1;
  });

  // Birds reaching bottom
  state.birds.forEach(b => {
    if (b.alive && b.y > canvas.height - 60) {
      b.alive = false;
      state.escaped++;
      updateLives();
      if (state.escaped >= 5) {
        endGame();
      }
    }
  });

  // Update projectiles
  state.projectiles.forEach(p => {
    if (!p.alive) return;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > 10) p.trail.shift();
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // slight gravity
    if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
      p.alive = false;
    }
  });

  // Collisions
  checkCollisions();

  // Particles
  state.particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.vx *= 0.97;
    p.life -= p.decay;
  });

  // Cleanup
  state.birds = state.birds.filter(b => b.alive);
  state.projectiles = state.projectiles.filter(p => p.alive);
  state.particles = state.particles.filter(p => p.life > 0);
}

// --- DRAW ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Stars
  stars.forEach(s => {
    s.twinkle += 0.03;
    const alpha = 0.4 + Math.sin(s.twinkle) * 0.4;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });

  // Ground line
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - 60);
  ctx.lineTo(canvas.width, canvas.height - 60);
  ctx.strokeStyle = 'rgba(255,80,80,0.3)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 6]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Danger zone label
  ctx.fillStyle = 'rgba(255,80,80,0.25)';
  ctx.font = '10px Fredoka One';
  ctx.fillText('⚠ ZONA PELIGRO', 8, canvas.height - 65);

  drawParticles();

  state.birds.forEach(b => drawBird(b));
  state.projectiles.forEach(p => drawProjectile(p));
  drawCannon();
}

// --- GAME LOOP ---
function gameLoop() {
  if (!state.running) return;
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- CONTROLS ---
let dragStartX = null;
let lastAngle = -Math.PI / 2;

canvas.addEventListener('pointerdown', e => {
  dragStartX = e.clientX;
  lastAngle = state.cannonAngle;
});
canvas.addEventListener('pointermove', e => {
  if (dragStartX === null) return;
  const dx = e.clientX - dragStartX;
  state.cannonAngle = Math.max(-Math.PI + 0.1, Math.min(-0.1, lastAngle + dx * 0.012));
});
canvas.addEventListener('pointerup', () => { dragStartX = null; });

document.getElementById('fire-btn').addEventListener('click', () => {
  if (state.running) fireProjectile();
});

// Touch fire button
document.getElementById('fire-btn').addEventListener('touchstart', e => {
  e.preventDefault();
  if (state.running) fireProjectile();
}, { passive: false });

// --- UI ---
function updateLives() {
  const full = '🐦'.repeat(Math.max(0, 5 - state.escaped));
  const empty = '💀'.repeat(state.escaped);
  document.getElementById('lives-display').textContent = full + empty;
}

function startGame() {
  state = {
    running: true,
    score: 0,
    escaped: 0,
    cannonAngle: -Math.PI / 2,
    birds: [],
    projectiles: [],
    particles: [],
    birdSpawnTimer: 0,
    frameCount: 0,
  };
  document.getElementById('score-display').textContent = '0';
  updateLives();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  generateStars();
  gameLoop();
}

function endGame() {
  state.running = false;
  document.getElementById('final-score').textContent = state.score;
  document.getElementById('gameover-screen').style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
</script>
</body>
</html>
