<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONG — Adrian vs Luis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --adrian: #00ffcc;
    --luis: #ff3366;
    --ball: #ffffff;
    --dim: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── PANTALLA DE SELECCIÓN ── */
  #screen-select {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  #screen-select h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(2rem, 8vw, 4rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--adrian), var(--luis));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  #screen-select p {
    color: rgba(255,255,255,0.4);
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }

  .btn-players {
    display: flex;
    gap: 24px;
  }

  .btn-player {
    padding: 18px 44px;
    border: 2px solid;
    background: transparent;
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-player::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-player:hover::before { opacity: 0.15; }
  .btn-player:hover { transform: translateY(-2px); }

  #btn-adrian {
    border-color: var(--adrian);
    color: var(--adrian);
    text-shadow: 0 0 10px var(--adrian);
    box-shadow: 0 0 20px rgba(0,255,204,0.2);
  }
  #btn-adrian::before { background: var(--adrian); }
  #btn-adrian:hover { box-shadow: 0 0 30px rgba(0,255,204,0.5); }

  #btn-luis {
    border-color: var(--luis);
    color: var(--luis);
    text-shadow: 0 0 10px var(--luis);
    box-shadow: 0 0 20px rgba(255,51,102,0.2);
  }
  #btn-luis::before { background: var(--luis); }
  #btn-luis:hover { box-shadow: 0 0 30px rgba(255,51,102,0.5); }

  /* ── PANTALLA DE ESPERA ── */
  #screen-wait {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
  }

  #screen-wait h2 {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
  }

  .pulse {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--adrian);
    animation: pulse 1s infinite;
    margin: 0 auto;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }

  /* ── PANTALLA DE JUEGO ── */
  #screen-game {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100dvh;
    position: relative;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }

  .hud-name { font-weight: 900; font-size: 0.85rem; }
  .hud-score { font-size: 2rem; font-weight: 900; }
  #hud-top { color: var(--luis); }
  #hud-bottom { color: var(--adrian); }
  #hud-center { color: rgba(255,255,255,0.3); font-size: 0.7rem; }

  canvas {
    flex: 1;
    display: block;
    width: 100%;
    touch-action: none;
  }

  /* ── PANTALLA FIN ── */
  #screen-end {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    text-align: center;
  }

  #screen-end h2 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1.5rem, 6vw, 3rem);
    letter-spacing: 0.2em;
  }

  #btn-restart {
    padding: 14px 36px;
    border: 2px solid rgba(255,255,255,0.4);
    background: transparent;
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #btn-restart:hover {
    background: rgba(255,255,255,0.1);
    border-color: #fff;
  }

  /* línea central */
  .center-line {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1px;
    background: repeating-linear-gradient(90deg,
      rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 8px,
      transparent 8px, transparent 18px);
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- SELECCIÓN -->
<div id="screen-select">
  <h1>PONG</h1>
  <p>¿QUIÉN ERES?</p>
  <div class="btn-players">
    <button class="btn-player" id="btn-adrian">ADRIAN</button>
    <button class="btn-player" id="btn-luis">LUIS</button>
  </div>
</div>

<!-- ESPERA -->
<div id="screen-wait">
  <h2 id="wait-msg">ESPERANDO AL RIVAL...</h2>
  <div class="pulse" id="wait-dot"></div>
  <p style="color:rgba(255,255,255,0.3);font-size:0.8rem">Pide al otro jugador que abra esta misma web</p>
</div>

<!-- JUEGO -->
<div id="screen-game">
  <div id="hud">
    <div id="hud-top">
      <div class="hud-name" id="hud-top-name">LUIS</div>
      <div class="hud-score" id="score-top">0</div>
    </div>
    <div id="hud-center">VS</div>
    <div id="hud-bottom" style="text-align:right">
      <div class="hud-name" id="hud-bottom-name">ADRIAN</div>
      <div class="hud-score" id="score-bottom">0</div>
    </div>
  </div>
  <div style="position:relative;flex:1;display:flex;">
    <div class="center-line"></div>
    <canvas id="canvas"></canvas>
  </div>
</div>

<!-- FIN -->
<div id="screen-end">
  <h2 id="end-msg">¡ADRIAN GANA!</h2>
  <button id="btn-restart">JUGAR DE NUEVO</button>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL = 'https://rxbwfozedqipwvfhuzby.supabase.co';
const SUPABASE_KEY = 'sb_publishable_2G53T3tdGzdFVFYmdahPDw_65nxBsb-';
const CHANNEL_NAME = 'pong-game-v1';
const PADDLE_W_RATIO = 0.22;   // ancho paleta relativo al canvas
const PADDLE_H = 10;
const BALL_R = 8;
const SCORE_WIN = 5;
const PADDLE_MARGIN = 30;
const SPEED_INCREMENT = 0.08;  // aceleración por segundo

// ── ESTADO ──────────────────────────────────────────────
let myRole = null;        // 'adrian' | 'luis'
let isHost = false;       // adrian es host (calcula física)
let channel = null;
let rivalConnected = false;

let scoreAdrian = 0;
let scoreLuis = 0;

// Posiciones normalizadas 0..1
let paddleAdrian = 0.5;
let paddleLuis   = 0.5;

let ball = { x: 0.5, y: 0.5, vx: 0, vy: 0 };
let gameRunning = false;
let lastTime = null;
let totalTime = 0;

// Drag
let dragging = false;
let dragStartX = 0;
let dragStartPaddle = 0;

// ── SUPABASE ─────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function initChannel() {
  channel = sb.channel(CHANNEL_NAME, {
    config: { broadcast: { self: false } }
  });

  channel
    .on('broadcast', { event: 'presence' }, ({ payload }) => {
      if (payload.role !== myRole) {
        rivalConnected = true;
        onRivalJoined();
      }
    })
    .on('broadcast', { event: 'paddle' }, ({ payload }) => {
      if (payload.role === 'adrian') paddleAdrian = payload.x;
      else paddleLuis = payload.x;
    })
    .on('broadcast', { event: 'ball' }, ({ payload }) => {
      if (!isHost) {
        ball.x = payload.x;
        ball.y = payload.y;
      }
    })
    .on('broadcast', { event: 'score' }, ({ payload }) => {
      scoreAdrian = payload.adrian;
      scoreLuis   = payload.luis;
      updateScoreUI();
      if (!isHost) resetBallLocal();
      if (payload.adrian >= SCORE_WIN || payload.luis >= SCORE_WIN) endGame();
    })
    .on('broadcast', { event: 'reset' }, () => {
      if (!isHost) resetBallLocal();
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        // Anunciar presencia
        channel.send({ type: 'broadcast', event: 'presence', payload: { role: myRole } });
      }
    });
}

function sendPaddle(x) {
  channel.send({ type: 'broadcast', event: 'paddle', payload: { role: myRole, x } });
}

function sendBall() {
  channel.send({ type: 'broadcast', event: 'ball', payload: { x: ball.x, y: ball.y } });
}

function sendScore() {
  channel.send({ type: 'broadcast', event: 'score',
    payload: { adrian: scoreAdrian, luis: scoreLuis } });
}

// ── UI ───────────────────────────────────────────────────
function show(id) {
  ['screen-select','screen-wait','screen-game','screen-end'].forEach(s => {
    document.getElementById(s).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
}

function choosePlayer(role) {
  myRole = role;
  isHost = (role === 'adrian');

  // Orientar HUD según quién soy
  if (myRole === 'adrian') {
    document.getElementById('hud-bottom-name').textContent = 'TÚ (ADRIAN)';
    document.getElementById('hud-top-name').textContent    = 'LUIS';
  } else {
    document.getElementById('hud-bottom-name').textContent = 'TÚ (LUIS)';
    document.getElementById('hud-top-name').textContent    = 'ADRIAN';
  }

  show('screen-wait');
  initChannel();
}

function onRivalJoined() {
  show('screen-game');
  resizeCanvas();
  if (isHost) {
    setTimeout(() => {
      resetBallLocal();
      gameRunning = true;
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }, 800);
  } else {
    gameRunning = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }
}

function updateScoreUI() {
  if (myRole === 'adrian') {
    document.getElementById('score-bottom').textContent = scoreAdrian;
    document.getElementById('score-top').textContent    = scoreLuis;
  } else {
    document.getElementById('score-bottom').textContent = scoreLuis;
    document.getElementById('score-top').textContent    = scoreAdrian;
  }
}

// ── CANVAS ───────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);

// ── FÍSICA (solo host = Adrian) ──────────────────────────
function resetBallLocal() {
  ball.x = 0.5;
  ball.y = 0.5;
  totalTime = 0;
  if (isHost) {
    const angle = (Math.random() * 60 - 30) * Math.PI / 180;
    const dir   = Math.random() < 0.5 ? 1 : -1;
    const speed = 0.35; // unidades/segundo normalizadas
    ball.vx = Math.sin(angle) * speed;
    ball.vy = Math.cos(angle) * speed * dir;
    sendBall();
    channel.send({ type: 'broadcast', event: 'reset', payload: {} });
  }
}

function physicsStep(dt) {
  if (!isHost || !gameRunning) return;

  totalTime += dt;
  // Aceleración gradual
  const speedMult = 1 + totalTime * SPEED_INCREMENT;

  ball.x += ball.vx * dt * speedMult;
  ball.y += ball.vy * dt * speedMult;

  const W = canvas.width;
  const H = canvas.height;
  const br = BALL_R / W; // radio normalizado en X
  const brY = BALL_R / H;

  // Rebote paredes laterales
  if (ball.x - br < 0) { ball.x = br; ball.vx = Math.abs(ball.vx); }
  if (ball.x + br > 1) { ball.x = 1 - br; ball.vx = -Math.abs(ball.vx); }

  // Paleta arriba (Luis, y~0)
  const pw = PADDLE_W_RATIO / 2;
  const topY    = (PADDLE_MARGIN + PADDLE_H) / H;
  const bottomY = 1 - (PADDLE_MARGIN + PADDLE_H) / H;

  // Colisión paleta superior (Luis)
  if (ball.vy < 0 && ball.y - brY < topY) {
    if (Math.abs(ball.x - paddleLuis) < pw) {
      ball.y = topY + brY;
      ball.vy = Math.abs(ball.vy);
      // Añadir algo de efecto según dónde golpea
      const offset = (ball.x - paddleLuis) / pw;
      ball.vx += offset * 0.1;
    } else {
      // Punto para Adrian
      scoreAdrian++;
      updateScoreUI();
      sendScore();
      if (scoreAdrian < SCORE_WIN) resetBallLocal();
      else { endGame(); return; }
    }
  }

  // Colisión paleta inferior (Adrian)
  if (ball.vy > 0 && ball.y + brY > bottomY) {
    if (Math.abs(ball.x - paddleAdrian) < pw) {
      ball.y = bottomY - brY;
      ball.vy = -Math.abs(ball.vy);
      const offset = (ball.x - paddleAdrian) / pw;
      ball.vx += offset * 0.1;
    } else {
      // Punto para Luis
      scoreLuis++;
      updateScoreUI();
      sendScore();
      if (scoreLuis < SCORE_WIN) resetBallLocal();
      else { endGame(); return; }
    }
  }

  sendBall();
}

// ── RENDER ───────────────────────────────────────────────
function render() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const pw = PADDLE_W_RATIO * W;

  // Paleta arriba
  // Si soy Adrian: arriba es Luis (color luis)
  // Si soy Luis: arriba es Adrian (color adrian)
  const topColor    = myRole === 'adrian' ? getComputedStyle(document.documentElement).getPropertyValue('--luis').trim()   : getComputedStyle(document.documentElement).getPropertyValue('--adrian').trim();
  const bottomColor = myRole === 'adrian' ? getComputedStyle(document.documentElement).getPropertyValue('--adrian').trim() : getComputedStyle(document.documentElement).getPropertyValue('--luis').trim();

  // Posición de la paleta rival arriba y la mía abajo
  const topPaddleX    = myRole === 'adrian' ? paddleLuis   : paddleAdrian;
  const bottomPaddleX = myRole === 'adrian' ? paddleAdrian : paddleLuis;

  // Paleta arriba (rival)
  ctx.fillStyle = topColor;
  ctx.shadowColor = topColor;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.roundRect(topPaddleX * W - pw/2, PADDLE_MARGIN, pw, PADDLE_H, 5);
  ctx.fill();

  // Paleta abajo (yo)
  ctx.fillStyle = bottomColor;
  ctx.shadowColor = bottomColor;
  ctx.shadowBlur = 18;
  ctx.beginPath();
  ctx.roundRect(bottomPaddleX * W - pw/2, H - PADDLE_MARGIN - PADDLE_H, pw, PADDLE_H, 5);
  ctx.fill();

  // Bola
  // Invertir Y si soy Luis (porque veo el campo al revés)
  const ballScreenX = ball.x * W;
  const ballScreenY = myRole === 'luis' ? (1 - ball.y) * H : ball.y * H;

  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(ballScreenX, ballScreenY, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
}

// ── LOOP ─────────────────────────────────────────────────
function loop(now) {
  if (!gameRunning) return;
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  physicsStep(dt);
  render();
  requestAnimationFrame(loop);
}

// ── FIN ──────────────────────────────────────────────────
function endGame() {
  gameRunning = false;
  const winner = scoreAdrian >= SCORE_WIN ? 'ADRIAN' : 'LUIS';
  document.getElementById('end-msg').textContent = `¡${winner} GANA!`;
  document.getElementById('end-msg').style.color =
    winner === 'ADRIAN' ? 'var(--adrian)' : 'var(--luis)';
  show('screen-end');
}

// ── CONTROLES ────────────────────────────────────────────
function getCanvasX(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return (clientX - rect.left) / rect.width;
}

canvas.addEventListener('pointerdown', e => {
  dragging = true;
  dragStartX = getCanvasX(e);
  dragStartPaddle = myRole === 'adrian' ? paddleAdrian : paddleLuis;
  canvas.setPointerCapture(e.pointerId);
});

canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = getCanvasX(e) - dragStartX;
  let newX = Math.max(PADDLE_W_RATIO/2, Math.min(1 - PADDLE_W_RATIO/2, dragStartPaddle + dx));
  if (myRole === 'adrian') paddleAdrian = newX;
  else paddleLuis = newX;
  sendPaddle(newX);
});

canvas.addEventListener('pointerup',   () => dragging = false);
canvas.addEventListener('pointercancel',() => dragging = false);

// ── BOTONES ──────────────────────────────────────────────
document.getElementById('btn-adrian').addEventListener('click', () => choosePlayer('adrian'));
document.getElementById('btn-luis').addEventListener('click',   () => choosePlayer('luis'));

document.getElementById('btn-restart').addEventListener('click', () => {
  scoreAdrian = 0; scoreLuis = 0;
  updateScoreUI();
  show('screen-game');
  if (isHost) {
    setTimeout(() => {
      resetBallLocal();
      gameRunning = true;
      lastTime = performance.now();
      requestAnimationFrame(loop);
    }, 300);
  } else {
    gameRunning = true;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }
});
</script>
</body>
</html>
